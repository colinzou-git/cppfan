name: Interactive Terminal real-service E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  real-terminal:
    name: Real interactive Terminal
    if: >-
      ${{
        vars.CODE_TERMINAL_REAL_E2E_ENABLED == 'true' &&
        (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository)
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      VPS_SSH_HOST: ${{ vars.VPS_SSH_HOST }}
      VPS_SSH_USER: ${{ vars.VPS_SSH_USER }}
      VPS_JUDGE0_PORT: ${{ vars.VPS_JUDGE0_PORT }}
      VPS_TERMINAL_PORT: ${{ vars.VPS_TERMINAL_PORT }}

      CODE_RUNNER_PROVIDER: judge0
      CODE_RUNNER_BASE_URL: http://127.0.0.1:23580
      CODE_RUNNER_API_KEY: ${{ secrets.CODE_RUNNER_API_KEY }}
      CODE_RUNNER_JUDGE0_CPP_LANGUAGE_ID: ${{ vars.CODE_RUNNER_JUDGE0_CPP_LANGUAGE_ID }}
      CODE_RUNNER_JUDGE0_ENABLE_COMPILER_OPTIONS: ${{ vars.CODE_RUNNER_JUDGE0_ENABLE_COMPILER_OPTIONS }}
      CPPFAN_REQUIRE_REAL_CODE_RUNNER: "true"

      CODE_TERMINAL_PROVIDER: execution-service
      CODE_TERMINAL_BASE_URL: http://127.0.0.1:23581
      CODE_TERMINAL_API_KEY: ${{ secrets.CODE_TERMINAL_API_KEY }}
      CPPFAN_REQUIRE_REAL_CODE_TERMINAL: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm through Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install dedicated SSH credentials
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${VPS_SSH_HOST:?VPS_SSH_HOST is required}"
          : "${VPS_SSH_USER:?VPS_SSH_USER is required}"
          : "${VPS_JUDGE0_PORT:?VPS_JUDGE0_PORT is required}"
          : "${VPS_TERMINAL_PORT:?VPS_TERMINAL_PORT is required}"
          : "${VPS_SSH_PRIVATE_KEY:?VPS_SSH_PRIVATE_KEY is required}"
          : "${VPS_SSH_KNOWN_HOSTS:?VPS_SSH_KNOWN_HOSTS is required}"
          : "${CODE_RUNNER_API_KEY:?CODE_RUNNER_API_KEY is required}"
          : "${CODE_TERMINAL_API_KEY:?CODE_TERMINAL_API_KEY is required}"

          ssh_dir="${RUNNER_TEMP}/cppfan-real-services-ssh"
          key_path="${ssh_dir}/cppfan_ci"
          known_hosts_path="${ssh_dir}/known_hosts"
          install -d -m 700 "${ssh_dir}"
          install -m 600 /dev/null "${key_path}"
          install -m 600 /dev/null "${known_hosts_path}"
          printf '%s\n' "${VPS_SSH_PRIVATE_KEY}" | tr -d '\r' >"${key_path}"
          printf '%s\n' "${VPS_SSH_KNOWN_HOSTS}" | tr -d '\r' >"${known_hosts_path}"
          chmod 600 "${key_path}" "${known_hosts_path}"
          ssh-keygen -y -f "${key_path}" >/dev/null
          ssh-keygen -F "${VPS_SSH_HOST}" -f "${known_hosts_path}" >/dev/null

          echo "CPPFAN_REAL_SSH_KEY=${key_path}" >>"${GITHUB_ENV}"
          echo "CPPFAN_REAL_KNOWN_HOSTS=${known_hosts_path}" >>"${GITHUB_ENV}"

      - name: Start SSH tunnels
        run: |
          set -euo pipefail
          tunnel_log="${RUNNER_TEMP}/real-services-ssh-tunnel.log"
          ssh -N \
            -i "${CPPFAN_REAL_SSH_KEY}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o ExitOnForwardFailure=yes \
            -o PasswordAuthentication=no \
            -o KbdInteractiveAuthentication=no \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${CPPFAN_REAL_KNOWN_HOSTS}" \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            -L "127.0.0.1:23580:127.0.0.1:${VPS_JUDGE0_PORT}" \
            -L "127.0.0.1:23581:127.0.0.1:${VPS_TERMINAL_PORT}" \
            "${VPS_SSH_USER}@${VPS_SSH_HOST}" \
            >"${tunnel_log}" 2>&1 &

          tunnel_pid=$!
          echo "CPPFAN_REAL_TUNNEL_PID=${tunnel_pid}" >>"${GITHUB_ENV}"

          for _ in $(seq 1 30); do
            kill -0 "${tunnel_pid}" 2>/dev/null || {
              tail -n 50 "${tunnel_log}" >&2 || true
              exit 1
            }

            judge0_ok=false
            terminal_ok=false
            curl --fail --silent --show-error \
              --connect-timeout 2 --max-time 5 \
              -H "X-Auth-Token: ${CODE_RUNNER_API_KEY}" \
              "${CODE_RUNNER_BASE_URL}/languages" >/dev/null && judge0_ok=true
            curl --fail --silent --show-error \
              --connect-timeout 2 --max-time 5 \
              "${CODE_TERMINAL_BASE_URL}/health" >/dev/null && terminal_ok=true

            if [[ "${judge0_ok}" == true && "${terminal_ok}" == true ]]; then
              exit 0
            fi
            sleep 1
          done

          echo "Real services did not become reachable through the SSH tunnels." >&2
          exit 1

      - name: Verify Judge0 compile/run
        run: bash scripts/ci/verify-judge0.sh

      - name: Verify interactive Terminal service
        run: bash scripts/ci/verify-code-terminal.sh

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run focused authenticated real-service browser E2E
        run: >-
          pnpm test:e2e:authenticated
          tests/e2e/authenticated-terminal-real.spec.ts
          --project=chromium

      - name: Upload real Terminal diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: terminal-real-service-diagnostics
          path: |
            ${{ runner.temp }}/real-services-ssh-tunnel.log
            ${{ runner.temp }}/terminal-preflight-summary.txt
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop SSH tunnels
        if: always()
        run: |
          if [[ -n "${CPPFAN_REAL_TUNNEL_PID:-}" ]] &&
             kill -0 "${CPPFAN_REAL_TUNNEL_PID}" 2>/dev/null; then
            kill "${CPPFAN_REAL_TUNNEL_PID}"
            wait "${CPPFAN_REAL_TUNNEL_PID}" || true
          fi
