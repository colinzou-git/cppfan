name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  app:
    name: App checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm through Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: E2E tests
        run: pnpm test:e2e

  db:
    name: DB migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bootstrap Supabase-compatible objects
        run: psql -v ON_ERROR_STOP=1 -f scripts/ci/bootstrap.sql

      - name: Apply all migrations in order
        run: |
          for f in supabase/migrations/*.sql; do
            echo "--> $f"
            psql -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Smoke-test migrated schema
        run: psql -v ON_ERROR_STOP=1 -f scripts/ci/smoke.sql

  cpp:
    name: C++ exercises
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # #98: compile-check the write-code exercise packages from a clean Linux
      # toolchain — every reference solution builds and passes its tests and every
      # starter builds, with AddressSanitizer/UBSan enabled (verify-all.sh).
      - name: Verify C++ exercise packages
        run: bash scripts/exercises/verify-all.sh

