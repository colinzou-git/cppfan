name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  app:
    name: App checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm through Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: E2E tests
        run: pnpm test:e2e

  db:
    name: DB migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm through Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bootstrap Supabase-compatible objects
        run: psql -v ON_ERROR_STOP=1 -f scripts/ci/bootstrap.sql

      - name: Apply all migrations in order
        run: |
          for f in supabase/migrations/*.sql; do
            echo "--> $f"
            psql -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Smoke-test migrated schema
        run: psql -v ON_ERROR_STOP=1 -f scripts/ci/smoke.sql

      - name: Verify DB and TypeScript seed parity
        run: pnpm test:db-parity

  cpp:
    name: C++ exercises
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # #98: compile-check the write-code exercise packages from a clean Linux
      # toolchain — every reference solution builds and passes its tests and every
      # starter builds, with AddressSanitizer/UBSan enabled (verify-all.sh).
      - name: Verify C++ exercise packages
        run: bash scripts/exercises/verify-all.sh

      # #98: compile-check the structured curriculum code examples — positive
      # examples compile clean under their declared standard with -Wall -Wextra
      # -Wpedantic -Werror and match their output contract; bug-spotting examples
      # are validated structurally by the unit suite.
      - name: Verify curriculum examples
        run: node scripts/curriculum-examples/verify.mjs

  auth-integration:
    name: Authenticated integration
    runs-on: ubuntu-latest

    # #96: authenticated full-loop + RLS isolation against a DISPOSABLE LOCAL
    # Supabase stack. The local stack ships well-known dev anon/service keys (not
    # secrets); no production credential is used.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm through Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack (applies all migrations)
        run: supabase start

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Run authenticated integration tests
        run: |
          eval "$(supabase status -o env \
            --override-name api.url=SUPABASE_URL \
            --override-name auth.anon_key=SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY)"
          export SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY
          echo "Supabase URL: ${SUPABASE_URL}"
          pnpm test:integration

      - name: Run authenticated browser E2E tests
        run: |
          eval "$(supabase status -o env \
            --override-name api.url=SUPABASE_URL \
            --override-name auth.anon_key=SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY)"
          export SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY
          export NEXT_PUBLIC_SUPABASE_URL="${SUPABASE_URL}"
          export NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY="${SUPABASE_ANON_KEY}"
          export NEXT_PUBLIC_APP_URL="http://127.0.0.1:3000"
          pnpm exec playwright test tests/e2e/authenticated-learning-loop.spec.ts --project=chromium --project=iphone

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup || true
