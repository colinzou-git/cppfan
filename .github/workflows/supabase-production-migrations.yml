name: Supabase production migrations

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "scripts/apply-migrations.sh"
      - ".github/workflows/supabase-production-migrations.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-production-migrations
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply production Supabase migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Apply all migrations to production Supabase
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "::error::SUPABASE_DB_URL is not configured as a GitHub Actions repository secret."
            echo "Add the Supabase session-pooler Postgres URI under Settings -> Secrets and variables -> Actions, then re-run this workflow."
            exit 1
          fi
          bash scripts/apply-migrations.sh

      - name: Verify Goals schema reached production
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "${SUPABASE_DB_URL}" -v ON_ERROR_STOP=1 <<'SQL'
          do $$
          begin
            if to_regclass('public.study_goals') is null then
              raise exception 'missing public.study_goals';
            end if;
            if to_regclass('public.study_goal_revisions') is null then
              raise exception 'missing public.study_goal_revisions';
            end if;
            if to_regclass('public.study_goal_targets') is null then
              raise exception 'missing public.study_goal_targets';
            end if;
            if to_regclass('public.study_goal_daily_allocations') is null then
              raise exception 'missing public.study_goal_daily_allocations';
            end if;
            if not exists (select 1 from pg_proc where proname = 'create_study_goal') then
              raise exception 'missing create_study_goal RPC';
            end if;
            if not exists (select 1 from pg_proc where proname = 'revise_study_goal') then
              raise exception 'missing revise_study_goal RPC';
            end if;
          end $$;
          SQL
