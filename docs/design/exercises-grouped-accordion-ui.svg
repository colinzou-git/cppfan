<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">cppFan grouped Exercises page design</title>
  <desc id="desc">Approved UI direction for the Exercises page: dark left sidebar, grouped accordion exercise table, single selected sub-exercise, simplified right detail panel, and Study button.</desc>
  <defs>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#071225"/>
      <stop offset="1" stop-color="#020817"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d5dfc"/>
      <stop offset="1" stop-color="#4f2ee8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .font { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { font-size: 18px; }
      .body { font-size: 22px; }
      .label { font-size: 18px; font-weight: 700; fill: #334155; }
      .title { font-size: 30px; font-weight: 800; fill: #0f172a; }
      .white { fill: #f8fafc; }
      .muted { fill: #64748b; }
      .ink { fill: #0f172a; }
      .bold { font-weight: 800; }
      .rowline { stroke: #e2e8f0; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1672" height="941" fill="#f8fafc"/>
  <rect x="0" y="0" width="1672" height="76" fill="url(#top)"/>
  <rect x="0" y="0" width="236" height="941" fill="#061326"/>
  <rect x="236" y="0" width="1" height="941" fill="#13233a"/>

  <g class="font white">
    <text x="24" y="48" font-size="28">☰</text>
    <rect x="80" y="23" width="28" height="28" rx="8" fill="#6d5dfc"/>
    <text x="121" y="49" font-size="28" font-weight="800">cpp<tspan fill="#7c3aed">Fan</tspan></text>
    <text x="268" y="49" font-size="30" font-weight="800">Exercises</text>
  </g>

  <g class="font" font-size="18" fill="#e5e7eb">
    <text x="32" y="132">⌂</text><text x="72" y="132">Review</text>
    <text x="32" y="194">□</text><text x="72" y="194">Resources</text>
    <text x="32" y="256">⚗</text><text x="72" y="256">Labs</text>
    <text x="32" y="318">◎</text><text x="72" y="318">Placement</text>
    <rect x="14" y="342" width="206" height="58" rx="8" fill="url(#purple)" opacity="0.80"/>
    <text x="32" y="379" fill="#ffffff">‹›</text><text x="72" y="379" fill="#ffffff">Exercises</text>
    <text x="32" y="441">🎙</text><text x="72" y="441">Interview</text>
    <text x="32" y="503">○</text><text x="72" y="503">Profile</text>
    <text x="32" y="670">⚙</text><text x="72" y="670">Settings</text>
    <text x="32" y="732">◇</text><text x="72" y="732">Auth Setup</text>
    <rect x="18" y="834" width="142" height="44" rx="10" fill="#07192f" stroke="#1e2e46"/>
    <text x="32" y="863">☾</text><text x="68" y="863">Dark⌄</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="258" y="104" width="374" height="52" rx="12" fill="#ffffff" stroke="#dbe4ef"/>
    <text class="font muted" x="316" y="137" font-size="18">Search exercises...</text>
    <text class="font muted" x="286" y="137" font-size="24">⌕</text>
    <rect x="654" y="104" width="112" height="52" rx="12" fill="#ffffff" stroke="#dbe4ef"/>
    <text class="font ink small" x="690" y="137">Topic⌄</text>
    <rect x="786" y="104" width="138" height="52" rx="12" fill="#ffffff" stroke="#dbe4ef"/>
    <text class="font ink small" x="812" y="137">Difficulty⌄</text>
    <rect x="946" y="104" width="120" height="52" rx="12" fill="#ffffff" stroke="#dbe4ef"/>
    <text class="font ink small" x="976" y="137">Status⌄</text>
    <rect x="1082" y="104" width="170" height="52" rx="12" fill="#ffffff" stroke="#dbe4ef"/>
    <text class="font ink small" x="1112" y="137">Sort: Default⌄</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="258" y="180" width="990" height="744" rx="12" fill="#ffffff" stroke="#dbe4ef"/>
    <rect x="258" y="180" width="990" height="58" rx="12" fill="#f8fafc"/>
    <line x1="258" y1="238" x2="1248" y2="238" class="rowline"/>
    <text class="font label" x="312" y="211">Exercise</text>
    <text class="font label" x="728" y="211">Progress</text>
    <text class="font label" x="986" y="211">Start</text>
    <text class="font label" x="1124" y="211">Complete</text>

    <g class="font body ink">
      <line x1="258" y1="296" x2="1248" y2="296" class="rowline"/>
      <text x="288" y="270">›</text><rect x="328" y="247" width="30" height="30" rx="8" fill="#dcfce7"/><text x="338" y="270" fill="#16a34a" font-weight="800">B</text><text x="374" y="270" font-weight="800">Basics</text>
      <rect x="730" y="258" width="110" height="7" rx="3" fill="#e5e7eb"/><rect x="730" y="258" width="28" height="7" rx="3" fill="#22c55e"/><text x="862" y="270">20%</text><text x="1006" y="270">5 / 25</text><text x="1156" y="270">–</text>

      <rect x="258" y="296" width="990" height="58" fill="#f3efff"/>
      <line x1="258" y1="354" x2="1248" y2="354" class="rowline"/>
      <text x="288" y="329">⌄</text><rect x="328" y="306" width="30" height="30" rx="8" fill="#ddd6fe"/><text x="338" y="329" fill="#4f46e5" font-weight="800">C</text><text x="374" y="329" font-weight="800">Control Flow</text>
      <rect x="730" y="317" width="110" height="7" rx="3" fill="#e5e7eb"/><rect x="730" y="317" width="44" height="7" rx="3" fill="#22c55e"/><text x="862" y="329">40%</text><text x="1006" y="329">4 / 18</text><text x="1156" y="329">–</text>

      <line x1="286" y1="412" x2="1248" y2="412" class="rowline"/>
      <circle cx="332" cy="384" r="7" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="356" y="391" font-weight="700">Conditionals Drill</text><rect x="625" y="367" width="48" height="28" rx="7" fill="#dcfce7" stroke="#86efac"/><text x="635" y="387" fill="#16a34a" font-size="17">Easy</text><rect x="730" y="380" width="110" height="7" rx="3" fill="#e5e7eb"/><rect x="730" y="380" width="72" height="7" rx="3" fill="#22c55e"/><text x="862" y="391">75%</text><text x="964" y="391">In Progress</text><text x="1156" y="391">–</text>

      <rect x="286" y="412" width="938" height="52" rx="8" fill="#f5f0ff" stroke="#e0d4ff"/>
      <circle cx="332" cy="438" r="8" fill="#6d5dfc"/><circle cx="332" cy="438" r="3" fill="#ffffff"/><text x="356" y="445" font-weight="800">Loop Practice</text><rect x="625" y="424" width="48" height="28" rx="7" fill="#dcfce7" stroke="#86efac"/><text x="635" y="444" fill="#16a34a" font-size="17">Easy</text><rect x="730" y="437" width="110" height="7" rx="3" fill="#e5e7eb"/><rect x="730" y="437" width="42" height="7" rx="3" fill="#22c55e"/><text x="862" y="445">40%</text><text x="964" y="445">In Progress</text><text x="1156" y="445">–</text>

      <line x1="286" y1="522" x2="1248" y2="522" class="rowline"/>
      <circle cx="332" cy="495" r="7" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="356" y="502" font-weight="700">Nested Loops Challenge</text><rect x="625" y="478" width="72" height="28" rx="7" fill="#ffedd5" stroke="#fdba74"/><text x="635" y="498" fill="#ea580c" font-size="17">Medium</text><rect x="730" y="491" width="110" height="7" rx="3" fill="#e5e7eb"/><text x="862" y="502">0%</text><text x="1008" y="502">–</text><text x="1156" y="502">–</text>

      <line x1="258" y1="580" x2="1248" y2="580" class="rowline"/>
      <text x="288" y="558">›</text><rect x="328" y="535" width="30" height="30" rx="8" fill="#ffedd5"/><text x="339" y="558" fill="#f97316" font-weight="800">F</text><text x="374" y="558" font-weight="800">Functions</text><rect x="730" y="547" width="110" height="7" rx="3" fill="#e5e7eb"/><rect x="730" y="547" width="24" height="7" rx="3" fill="#22c55e"/><text x="862" y="558">10%</text><text x="1006" y="558">2 / 20</text><text x="1156" y="558">–</text>

      <line x1="258" y1="638" x2="1248" y2="638" class="rowline"/>
      <text x="288" y="616">›</text><rect x="328" y="593" width="30" height="30" rx="8" fill="#dbeafe"/><text x="338" y="616" fill="#2563eb" font-weight="800">O</text><text x="374" y="616" font-weight="800">OOP</text><rect x="730" y="605" width="110" height="7" rx="3" fill="#e5e7eb"/><rect x="730" y="605" width="14" height="7" rx="3" fill="#22c55e"/><text x="862" y="616">5%</text><text x="1006" y="616">1 / 22</text><text x="1156" y="616">–</text>

      <text x="288" y="675">›</text><rect x="328" y="652" width="30" height="30" rx="8" fill="#ede9fe"/><text x="338" y="675" fill="#7c3aed" font-weight="800">M</text><text x="374" y="675" font-weight="800">Memory</text><rect x="730" y="664" width="110" height="7" rx="3" fill="#e5e7eb"/><text x="862" y="675">0%</text><text x="1006" y="675">0 / 12</text><text x="1156" y="675">–</text>
      <text x="288" y="735">›</text><rect x="328" y="712" width="30" height="30" rx="8" fill="#cffafe"/><text x="339" y="735" fill="#0891b2" font-weight="800">S</text><text x="374" y="735" font-weight="800">STL</text><rect x="730" y="724" width="110" height="7" rx="3" fill="#e5e7eb"/><text x="862" y="735">0%</text><text x="1006" y="735">0 / 15</text><text x="1156" y="735">–</text>
      <text x="288" y="795">›</text><rect x="328" y="772" width="30" height="30" rx="8" fill="#fee2e2"/><text x="339" y="795" fill="#ef4444" font-weight="800">D</text><text x="374" y="795" font-weight="800">Data Structures</text><rect x="730" y="784" width="110" height="7" rx="3" fill="#e5e7eb"/><rect x="730" y="784" width="20" height="7" rx="3" fill="#22c55e"/><text x="862" y="795">8%</text><text x="1006" y="795">1 / 25</text><text x="1156" y="795">–</text>
      <text x="288" y="855">›</text><rect x="328" y="832" width="30" height="30" rx="8" fill="#ffedd5"/><text x="339" y="855" fill="#f97316" font-weight="800">A</text><text x="374" y="855" font-weight="800">Algorithms</text><rect x="730" y="844" width="110" height="7" rx="3" fill="#e5e7eb"/><rect x="730" y="844" width="9" height="7" rx="3" fill="#22c55e"/><text x="862" y="855">3%</text><text x="1006" y="855">1 / 30</text><text x="1156" y="855">–</text>
    </g>
    <text class="font muted small" x="286" y="900">8 groups  •  48 exercises</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1276" y="104" width="374" height="820" rx="12" fill="#ffffff" stroke="#dbe4ef"/>
    <text class="font title" x="1302" y="162">Control Flow / Loop Practice</text>
    <line x1="1302" y1="198" x2="1624" y2="198" class="rowline"/>
    <text class="font label" x="1302" y="246">Description</text>
    <text class="font body muted" x="1302" y="292">Practice using for, while, and do-while loops.</text>
    <text class="font body muted" x="1302" y="328">Solve problems involving sums, patterns,</text>
    <text class="font body muted" x="1302" y="364">and simple simulations.</text>
    <line x1="1302" y1="410" x2="1624" y2="410" class="rowline"/>
    <text class="font label" x="1302" y="458">Learning Goals</text>
    <text class="font body muted" x="1302" y="508">• Use for, while, and do-while effectively</text>
    <text class="font body muted" x="1302" y="544">• Work with loop invariants</text>
    <text class="font body muted" x="1302" y="580">• Avoid off-by-one errors</text>
    <rect x="1302" y="776" width="322" height="64" rx="8" fill="url(#purple)"/>
    <text class="font white" x="1430" y="817" font-size="26" font-weight="700">▷  Study</text>
  </g>
</svg>
